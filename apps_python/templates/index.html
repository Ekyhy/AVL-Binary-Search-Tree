<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem AVL Tree Ekyhy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'neutral' });
        
        function filterTable() {
            let input = document.getElementById("searchBox").value.toUpperCase();
            let rows = document.getElementById("treeTable").getElementsByTagName("tr");
            for (let i = 1; i < rows.length; i++) {
                let text = rows[i].innerText.toUpperCase();
                rows[i].style.display = text.indexOf(input) > -1 ? "" : "none";
            }
        }
    </script>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="mb-4 text-center">Binary Search Tree (AVL Balanced)</h2>

        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white">Visualisasi Struktur Data</div>
            <div class="card-body overflow-auto" style="max-height: 500px; background: white;">
                <pre class="mermaid">
{{ mermaid_graph | safe }}
                </pre>
            </div>
            <div class="card-footer text-muted small">Tinggi Pohon: {{ height }}</div>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card mb-4 shadow-sm">
                    <div class="card-header">Tambah Data</div>
                    <form action="/add" method="POST" class="card-body">
                        <input type="number" name="id" class="form-control mb-2" placeholder="ID Baru" required>
                        <input type="text" name="nama" class="form-control mb-2" placeholder="Nama Baru" required>
                        <button type="submit" class="btn btn-success w-100">Tambah</button>
                    </form>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header">Traversal Path</div>
                    <div class="card-body">
                        <h6>Pre-Order:</h6> <p class="small text-break text-primary">{{ pre }}</p>
                        <h6>Post-Order:</h6> <p class="small text-break text-success">{{ post }}</p>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        Daftar Data (In-Order)
                        <input type="text" id="searchBox" onkeyup="filterTable()" class="form-control form-control-sm w-50" placeholder="Cari ID atau Nama...">
                    </div>
                    <div class="card-body p-0" style="max-height: 600px; overflow-y: auto;">
                        <table class="table table-hover mb-0" id="treeTable">
                            <thead class="table-dark sticky-top">
                                <tr><th>ID</th><th>Nama</th><th>Aksi</th></tr>
                            </thead>
                            <tbody>
                                {% for item in data %}
                                <tr>
                                    <td>{{ item.id }}</td>
                                    <td>{{ item.nama }}</td>
                                    <td><a href="/delete/{{ item.id }}" class="btn btn-outline-danger btn-sm">Hapus</a></td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
